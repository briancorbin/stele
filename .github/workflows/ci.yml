name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Build
        run: cargo build --release
      - name: Generated examples are up to date
        run: |
          cargo run --release -- generate
          if ! git diff --exit-code examples/; then
            echo "::error::examples/ is stale — run 'stele generate' and commit the result"
            exit 1
          fi
      - name: Catalog passes check
        run: cargo run --release -- check --strict
