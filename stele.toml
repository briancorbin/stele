canonical = "en"
locales = "examples/locales"

[[target]]
lang = "typescript"
out = "examples/out/stele.gen.ts"

[[target]]
lang = "swift"
out = "examples/out/Stele.swift"

[[target]]
lang = "store"
out = "examples/out/stele.store.ts"
core = "./stele.gen"

[[target]]
lang = "react"
out = "examples/out/stele.react.ts"
store = "./stele.store"

# A self-contained node package (compiled .js + .d.ts + package.json) — the
# "codegen as a dependency" model. Point `out` at node_modules/<name> in a real
# project and import it by name.
[package]
name = "@stele/example"
out = "examples/out/pkg"
store = true
react = true
